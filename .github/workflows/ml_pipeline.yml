name: Entrainement et Export ML

# Déclencheurs : lors d'une release ou manuellement
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  train-and-export:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code depuis GitHub
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      # 2. Installer Python
      - name: 🐍 Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Installer les librairies (pandas, scikit-learn)
      - name: 📦 Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Lancer ton script d'entraînement
      - name: 🧠 Entraînement et Export
        run: python export_model.py

      # 5. Attacher les fichiers générés à la Release GitHub
      - name: 🚀 Ajout aux Assets de la Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            model.pkl
            metrics.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}